services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llm_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-llm_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llm_gateway_password}
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-5467}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  llm-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-gateway:mac
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      DEBUG: ${DEBUG:-false}
      DATABASE_TYPE: ${DATABASE_TYPE:-postgresql}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://llm_gateway:llm_gateway_password@postgres:5432/llm_gateway}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KV_STORE_TYPE: ${KV_STORE_TYPE:-redis}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./data:/data
    restart: unless-stopped

  traefik:
    image: ghcr.io/traefik/traefik:v3.1
    depends_on:
      llm-gateway:
        condition: service_started
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
      - "127.0.0.1:${HTTPS_PORT:-443}:443"
    volumes:
      - ./traefik.mac.yml:/etc/traefik/traefik.yml:ro
      - ./traefik.dynamic.mac.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
